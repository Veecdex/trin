<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bokku Gift Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f4f8;
}

/* CARD */
.card{
    width:390px;
    height:210px;
    border-radius:14px;
    padding:18px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,#0d47a1,#1565c0);
    box-shadow:0 18px 40px rgba(0,0,0,0.18);
    color:white;
}

/* Yellow Accent Shape */
.card::after{
    content:"";
    position:absolute;
    width:160px;
    height:160px;
    background:#ffd400;
    border-radius:50%;
    bottom:-60px;
    right:-60px;
    opacity:0.12;
}

/* Top Section */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* Logo (bokku!) */
.logo{
    font-size:22px;
    font-weight:900;
    letter-spacing:1px;
    color:#ffd400;
    text-transform:lowercase;
}

/* Price */
.price{
    font-size:16px;
    font-weight:600;
    color:#ffd400;
}

/* Message Box */
.message-box{
    margin-top:28px;
    background:rgba(255,255,255,0.15);
    padding:9px 14px;
    border-radius:9px;
    backdrop-filter:blur(6px);
    font-size:13px;
    font-weight:500;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

/* Code Section */
.code-section{
    margin-top:18px;
}

.to-buy{
    font-size:10px;
    letter-spacing:2px;
    color:#ffd400;
    margin-bottom:5px;
}

.code{
    font-size:18px;
    font-weight:600;
    letter-spacing:6px;
}

/* Footer */
.footer{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:10px;
    opacity:0.85;
}

</style>
</head>
<body>

<div class="card">

    <div class="top">
        <div class="logo">bokku!</div>
        <div class="price">₦10,000</div>
    </div>

    <div class="message-box">
        🎉 Make Every Shopping Trip Special
    </div>

    <div class="code-section">
        <div class="to-buy">TO BUY</div>
        <div class="code">012 429 339</div>
    </div>

    <div class="footer">
        Powered by Trinfelly
    </div>

</div>

</body>
</html>
