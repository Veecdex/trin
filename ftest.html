
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelUp Gift Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}
/* Bottom Right Logo */
.bottom-logo {
    position: absolute;
    bottom: 18px;             /* flush with bottom */
    left: 89px;          /* slightly outside for style */
    width: 210px;          /* big size */
    height: auto;
    opacity: 0.1;         /* subtle but visible */
    pointer-events: none;  /* don't block clicks */
    transform: rotate(25deg); /* stylish tilt */
    z-index: 1;            /* behind text */
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ececec;
}

/* CARD */
.card{
    width:400px;
    height:220px;
    border-radius:14px;
    padding:18px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,#111111,#1c1c1c);
    color:white;
    box-shadow:0 20px 45px rgba(0,0,0,0.3);
}

/* Flame Accent */
.card::after{
    content:"";
    position:absolute;
    width:280px;
    height:350px;
    background:radial-gradient(circle,#ff3c00,#ff9500);
    border-radius:50%;
    bottom:-80px;
    right:-70px;
    opacity:0.15;
}

/* TOP ROW */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LOGO */
.logo{
    font-size:22px;
    font-weight:800;
    letter-spacing:1px;
    color:#ff9500;
}

.logo span{
    color:#ff3c00;
}

/* PRICE */
.price{
    font-size:22px;
    font-weight:700;
    color:#ff9500;
    letter-spacing:0.5px;
    display:flex;
    align-items:flex-start;
    gap:2px;
}

/* Small Naira symbol */
.price span{
    font-size:12px;
    position:relative;
    top:3px;
    opacity:0.9;
}

/* MESSAGE */
.message-box{
    margin-top:28px;
    background:rgba(255,255,255,0.05);
    padding:9px 14px;
    border-radius:8px;
    font-size:13px;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

/* CODE SECTION */
.code-section{
    margin-top:18px;
}

.to-buy{
    font-size:10px;
    letter-spacing:2px;
    color:#ff3c00;
    margin-bottom:5px;
    margin-top: 40px;
    font-weight: bold;
    text-align: center;
}

.code{
    font-size:20px;
    font-weight:600;
    letter-spacing:6px;
    text-align: center;
}

/* FOOTER */
.footer{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:10px;
    opacity:0.7;
}

</style>
</head>
<body>

<div class="card">

    <div class="top">
        <div class="logo">FUEL<span>UP!</span></div>
        <div class="price"><span>₦</span>20K</div>
    </div>


    <div class="code-section">
        <div class="to-buy">TO BUY CODE</div>
        <div class="code">784 562 119</div>
    </div>

    <div style="text-align: center;" class="footer">
        Powered by Trinfelly
    </div>
<!-- Add this inside the .card div, at the end -->
<img  src="logo_transparent.png" alt="Trinfelly Logo" class="bottom-logo">
</div>

</body>
</html>
